name: Peaks Cache

on:
  workflow_dispatch:
    inputs:
      backfill_from:
        description: "Optional: backfill from year (e.g., 2000)"
        required: false
      backfill_to:
        description: "Optional: backfill to year (e.g., 2026)"
        required: false
  schedule:
    # Once per day at 7:20 AM UTC
    - cron: "20 7 * * *"

permissions:
  contents: write

concurrency:
  group: peaks-cache-waretown
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater
        run: |
          set -euo pipefail
          BACKFILL_FROM="${{ github.event.inputs.backfill_from || '' }}"
          BACKFILL_TO="${{ github.event.inputs.backfill_to || '' }}"

          if [ -n "$BACKFILL_FROM" ] && [ -n "$BACKFILL_TO" ]; then
            node tools/update_peaks_navd88.js --backfill-from="$BACKFILL_FROM" --backfill-to="$BACKFILL_TO"
          else
            node tools/update_peaks_navd88.js
          fi

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/peaks_navd88.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update peaks cache"
          git pull --rebase
          git push
